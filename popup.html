<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Frame Capture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 0;
    }
    
    .header {
      background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
      padding: 20px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .container {
      padding: 16px;
    }
    
    .video-info {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    .video-info .label {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 4px;
    }
    
    .video-info .value {
      font-size: 13px;
      color: #fff;
      word-break: break-all;
    }
    
    .video-info .no-video {
      color: #ff6b6b;
      font-size: 13px;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .section-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: #e94560;
      border-radius: 2px;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-primary {
      background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
      color: #fff;
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .time-input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    
    .time-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .time-input:focus {
      border-color: #e94560;
    }
    
    .time-input::placeholder {
      color: #888;
    }
    
    .format-select {
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }
    
    .format-select option {
      background: #1a1a2e;
      color: #fff;
    }
    
    .tips {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
    }
    
    .tips-title {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #aaa;
    }
    
    .tips ul {
      list-style: none;
      font-size: 11px;
      color: #888;
    }
    
    .tips li {
      margin-bottom: 4px;
      padding-left: 12px;
      position: relative;
    }
    
    .tips li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #e94560;
    }
    
    .status {
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    
    .status.show {
      display: block;
    }
    
    .status.success {
      background: rgba(46, 204, 113, 0.2);
      color: #2ecc71;
    }
    
    .status.error {
      background: rgba(231, 76, 60, 0.2);
      color: #e74c3c;
    }
    
    .status.info {
      background: rgba(52, 152, 219, 0.2);
      color: #3498db;
    }
    
    .video-count {
      display: inline-block;
      background: #e94560;
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
    }
    
    .video-list {
      max-height: 120px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    
    .video-item {
      display: flex;
      align-items: center;
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .video-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    
    .video-item.selected {
      background: rgba(233, 69, 96, 0.3);
      border: 1px solid #e94560;
    }
    
    .video-item-icon {
      width: 32px;
      height: 32px;
      background: rgba(233, 69, 96, 0.3);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
    }
    
    .video-item-info {
      flex: 1;
      min-width: 0;
    }
    
    .video-item-size {
      font-size: 10px;
      color: #888;
    }
    
    .video-item-duration {
      font-size: 10px;
      color: #e94560;
      margin-left: 6px;
    }
    
    .refresh-btn {
      margin-left: auto;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 14px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: rotate(180deg);
    }
    
    .refresh-btn:active {
      transform: rotate(360deg);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎬 Video Frame Capture</h1>
    <p>一键下载视频首帧或指定帧图片</p>
  </div>
  
  <div class="container">
    <div id="status" class="status"></div>
    
    <div class="section">
      <div class="section-title">
        检测到的视频
        <span id="videoCount" class="video-count">0</span>
        <button id="refreshBtn" class="refresh-btn" title="刷新检测视频">
          🔄
        </button>
      </div>
      <div id="videoList" class="video-list">
        <div class="video-info">
          <div class="no-video">正在检测页面视频...</div>
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">下载首帧</div>
      <button id="captureFirstFrame" class="btn btn-primary" disabled>
        <span>📷</span> 一键下载视频首帧
      </button>
    </div>
    
    <div class="section">
      <div class="section-title">下载指定时间帧</div>
      <div class="time-input-group">
        <input type="text" id="timestamp" class="time-input" placeholder="输入时间 (如: 10, 1:30, 02:15)">
        <select id="format" class="format-select">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
      <button id="captureSpecificFrame" class="btn btn-secondary" disabled>
        <span>🎯</span> 跳转并下载指定帧
      </button>
    </div>
    
    <div class="section">
      <div class="section-title">快捷操作</div>
      <button id="captureCurrent" class="btn btn-secondary" disabled>
        <span>🖼️</span> 下载当前播放帧
      </button>
    </div>
    
    <div class="tips">
      <div class="tips-title">使用提示</div>
      <ul>
        <li>时间格式支持: 秒数(10)、分:秒(1:30)、时:分:秒(1:02:15)</li>
        <li>TikTok/抖音文件名包含用户名和视频ID</li>
        <li>部分受保护视频可能无法截取(如Netflix DRM)</li>
        <li>首次使用需等待视频加载完成</li>
      </ul>
    </div>
  </div>
  
  <script src="scripts/popup.js"></script>
</body>
</html>
